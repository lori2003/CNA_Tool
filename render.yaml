services:
  - type: web
    name: toolbox-cna
    env: python
    buildCommand: "apt-get install -y libreoffice-writer && pip install -r requirements_web.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: OPENROUTER_API_KEY
        sync: false
