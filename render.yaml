services:
  - type: web
    name: toolbox-cna
    env: python
    buildCommand: "pip install -r requirements_web.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: PORT
        value: 8501
      - key: OPENROUTER_API_KEY
        sync: false
